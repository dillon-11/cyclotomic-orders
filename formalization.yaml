    - method: "agent"
      models: ["claude-fable-5", "claude-opus-4-7"]
      framework: "Claude Code + the author's research engine (\"ail\")"
      tool_setup: >
        Three contributors: the human author (direction, judgment, review);
        Claude models via Claude Code (reasoning, implementation, Lean
        formalization); and the author's research harness ("ail") enforcing
        preregistration, control-first experiments, guard-checked kernels,
        and independent re-computation.